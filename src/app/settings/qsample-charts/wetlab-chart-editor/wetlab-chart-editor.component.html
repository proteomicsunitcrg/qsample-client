<div style="margin-left: 20px;">
  <mat-card>
    <mat-card-title>
      Sample preparation QC chart settings
    </mat-card-title>

    <mat-card-content>
      <p *ngIf="wetlab">
        WetLab: <strong>{{wetlab.name}}</strong>
      </p>

      <button mat-raised-button color="primary" (click)="initializePlots()">
        Initialize charts
      </button>

      <button mat-raised-button color="accent" (click)="savePlots()" style="margin-left: 10px;"
        [disabled]="plotConfigs.length === 0">
        Save
      </button>

      <button mat-raised-button color="basic" (click)="goBack()" style="margin-left: 10px;">
        Go back
      </button>
    </mat-card-content>
  </mat-card>

  <mat-card style="margin-top: 20px;">
    <mat-card-title>
      Charts
    </mat-card-title>

    <mat-card-content>
      <p *ngIf="plotConfigs.length === 0">
        No WetLab chart configuration found. Click <strong>Initialize charts</strong> to create it.
      </p>

      <table *ngIf="plotConfigs.length > 0" style="width: 100%;" mat-table [dataSource]="plotConfigs">

        <ng-container matColumnDef="enabled">
          <th mat-header-cell *matHeaderCellDef> Enabled </th>
          <td mat-cell *matCellDef="let plot">
            <mat-checkbox [(ngModel)]="plot.enabled"></mat-checkbox>
          </td>
        </ng-container>

        <ng-container matColumnDef="orderIndex">
          <th mat-header-cell *matHeaderCellDef> Order </th>
          <td mat-cell *matCellDef="let plot">
            {{plot.orderIndex}}
          </td>
        </ng-container>

        <ng-container matColumnDef="plotName">
          <th mat-header-cell *matHeaderCellDef> Chart </th>
          <td mat-cell *matCellDef="let plot">
            {{plot.plotName}}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Move </th>
          <td mat-cell *matCellDef="let plot; let i = index">
            <button mat-icon-button (click)="movePlotUp(i)" [disabled]="i === 0">
              <mat-icon>keyboard_arrow_up</mat-icon>
            </button>

            <button mat-icon-button (click)="movePlotDown(i)" [disabled]="i === plotConfigs.length - 1">
              <mat-icon>keyboard_arrow_down</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
