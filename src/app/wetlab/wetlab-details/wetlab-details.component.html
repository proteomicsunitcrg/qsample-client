<mat-card class="wetlab-details-card">

  <mat-card-title>
    {{wetlab.name}}
  </mat-card-title>

  <mat-divider></mat-divider>

  <div class="wetlab-details-content">

    <div class="wetlab-date-panel">
      <app-date-selector></app-date-selector>
    </div>

    <div class="wetlab-charts-panel">
      <app-dynamic-chart
        *ngIf="wetlab && wetlab.id"
        pageName="request_details"
        [wetlabId]="wetlab.id">
      </app-dynamic-chart>
    </div>

  </div>

</mat-card>
