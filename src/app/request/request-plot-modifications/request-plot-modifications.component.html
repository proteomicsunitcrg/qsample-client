<mat-card style="width: 100%; margin-bottom: 24px; box-sizing: border-box;">
  <h3><span class='title'>{{title}}</span><span class='request-help' class="material-icons" matTooltip="{{help}}">help</span></h3>

  <div id="Graph{{randString}}" [class.hide]="noDataFound === true" #Graph class="graph"
    color="primary 700" style="margin-bottom: 10px; width: 100%;"></div>

  <div *ngIf="noDataFound" class="pater">
    <h1 class="notFound">{{msgError}}</h1>
  </div>
</mat-card>
