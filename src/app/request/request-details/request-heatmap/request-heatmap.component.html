<mat-card style="width: 100%; margin-bottom: 24px; box-sizing: border-box;">
  <h3>Correlation of protein abundances (Top 3)</h3>

  <div *ngIf="nothingFound && !loading" class="pater">
    <h1 class="notFound">No quantification data available for this request.</h1>
  </div>

  <div [class.hide]="nothingFound === true">
    <mat-slider [max]="100" [min]="0" [(ngModel)]="sliderValue" [thumbLabel]="true" style="width: 95%;" (change)="sliderChange()">
    </mat-slider>
  </div>

  <div [class.hide]="nothingFound === true || loading" id="heatMap" #Graph class="graph" style="margin-bottom: 10px; width: 100%;"></div>

  <mat-spinner *ngIf="loading"></mat-spinner>
</mat-card>
