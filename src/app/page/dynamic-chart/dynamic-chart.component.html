<div class="dynamic-charts-container">

  <div *ngIf="loading">
    Loading charts...
  </div>

  <div *ngIf="error">
    {{ error }}
  </div>

  <div *ngFor="let chart of charts" class="notFound">

    <h3>{{ chart.title }}</h3>

    <p>{{ chart.description }}</p>

    <div
      class="plot-container"
      [id]="getChartDomId(chart)">
    </div>

  </div>

</div>
