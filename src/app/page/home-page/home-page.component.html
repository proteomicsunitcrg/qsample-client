<div class="home-page-tabs" *ngIf="isInternal">

  <mat-tab-group
    animationDuration="200ms"
    mat-align-tabs="start"
    [(selectedIndex)]="selectedTabIndex">

    <mat-tab label="Requests">
      <div class="home-tab-content">
        <app-main-requests></app-main-requests>
      </div>
    </mat-tab>

    <mat-tab label="Sample preparation QC">
      <div class="home-tab-content">
        <app-main-wetlab></app-main-wetlab>
      </div>
    </mat-tab>

    <mat-tab label="Processing logs">
      <div class="home-tab-content">
        <div class="home-qc-grid">

          <div class="home-qc-left">
            <app-dashboard-request></app-dashboard-request>
          </div>

          <div class="home-qc-right">
            <app-dashboard-wetlab></app-dashboard-wetlab>
          </div>

        </div>
      </div>
    </mat-tab>

  </mat-tab-group>

</div>

<!-- <app-dashboard-main></app-dashboard-main> -->

<!-- EXTERNAL USERS, WIP -->
<div
  fxLayout
  fxLayout.lt-md="column"
  fxLayoutAlign="center"
  fxLayoutGap="3px"
  fxLayoutGap.xs="0!"
  *ngIf="!isInternal">

  <div fxFlex="98%">
    <app-main-requests></app-main-requests>
  </div>

</div>
