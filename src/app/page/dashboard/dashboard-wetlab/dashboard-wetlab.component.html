<div class="recent-wetlab-files-card">

  <mat-card>
    <mat-card-title>
      {{ title }}
    </mat-card-title>

    <mat-card-content>

      <div class="recent-wetlab-files-subtitle">
        Search recently acquired sample preparation QC files.
      </div>

      <div class="recent-wetlab-files-controls">

        <mat-form-field appearance="fill" class="recent-date-field">
          <mat-label>Start date</mat-label>
          <input
            matInput
            [matDatepicker]="startPicker"
            [formControl]="range.controls.start">
          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="fill" class="recent-date-field">
          <mat-label>End date</mat-label>
          <input
            matInput
            [matDatepicker]="endPicker"
            [formControl]="range.controls.end">
          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="fill" class="recent-wetlab-field">
          <mat-label>QC type</mat-label>
          <mat-select [(value)]="wetlab">
            <mat-option [value]="allWetlabsOption">
              All
            </mat-option>

            <mat-option *ngFor="let item of allWetlabs" [value]="item">
              {{ item.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="recent-search-button"
          [disabled]="range.invalid"
          (click)="getAllWetlabFiles()">
          <mat-icon>search</mat-icon>
          Search
        </button>

      </div>

      <table
        mat-table
        [dataSource]="datasource"
        class="recent-wetlab-files-table">

        <ng-container matColumnDef="creation_date">
          <th mat-header-cell *matHeaderCellDef>
            Acquisition date
          </th>
          <td mat-cell *matCellDef="let entry">
            {{ entry.creation_date }}
          </td>
        </ng-container>

        <ng-container matColumnDef="filename">
          <th mat-header-cell *matHeaderCellDef>
            Filename
          </th>
          <td mat-cell *matCellDef="let entry">
            {{ entry.filename }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>

      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons>
      </mat-paginator>

    </mat-card-content>
  </mat-card>

</div>
