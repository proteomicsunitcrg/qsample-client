<div class="recent-request-files-card">

  <mat-card>
    <mat-card-title>
      Recently processed request files
    </mat-card-title>

    <mat-card-content>

      <div class="recent-request-files-subtitle">
        Search recently acquired files linked to QSample requests.
      </div>

      <div class="recent-request-files-controls">

        <mat-form-field appearance="fill" class="recent-date-field">
          <mat-label>Start date</mat-label>
          <input
            matInput
            [matDatepicker]="startPicker"
            [formControl]="range.controls.start">
          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="fill" class="recent-date-field">
          <mat-label>End date</mat-label>
          <input
            matInput
            [matDatepicker]="endPicker"
            [formControl]="range.controls.end">
          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field class="recent-code-field">
          <input
            matInput
            placeholder="Request code"
            [(ngModel)]="code">
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="recent-search-button"
          [disabled]="range.invalid"
          (click)="getAllRequestFiles()">
          <mat-icon>search</mat-icon>
          Search
        </button>

      </div>

      <table
        mat-table
        [dataSource]="datasource"
        class="recent-request-files-table">

        <ng-container matColumnDef="creation_date">
          <th mat-header-cell *matHeaderCellDef>
            Acquisition date
          </th>
          <td mat-cell *matCellDef="let entry">
            {{entry.creation_date}}
          </td>
        </ng-container>

        <ng-container matColumnDef="filename">
          <th mat-header-cell *matHeaderCellDef>
            Filename
          </th>
          <td mat-cell *matCellDef="let entry">
            {{entry.filename}}
          </td>
        </ng-container>

        <ng-container matColumnDef="requestCode">
          <th mat-header-cell *matHeaderCellDef>
            Request code
          </th>
          <td mat-cell *matCellDef="let entry">
            <a
              class="request-code-link"
              href="javascript:void(0)"
              (click)="navigateToRequestCode(entry.requestCode)">
              {{entry.requestCode}}
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>

      </table>

      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons>
      </mat-paginator>

    </mat-card-content>
  </mat-card>

</div>
